[book]
authors = ["Minoru Osuka"]
language = "ja"
src = "src"
title = "wikiext ドキュメント"
description = "wikiext - Rust製高性能 Wikipedia ダンプテキスト抽出ツールのドキュメント"

[build]
build-dir = "../../target/docs/ja"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/mosuka/wext"
edit-url-template = "https://github.com/mosuka/wext/edit/main/docs/ja/{path}"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
